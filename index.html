<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ITF Summit 2026</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="push-wrapper">

    <div class="app-frame">

      <!-- ẢNH NỀN (toàn bộ text/logo do designer đặt cứng trong ảnh này) -->
      <img id="main-bg" class="app-bg" src="" alt="background">

      <!-- MAIN MENU: 5 BUTTON GIAI ĐOẠN (render bằng JS từ stagesData) -->
      <main id="stage-menu" class="stage-menu"></main>

      <!-- 3 NHÃN HÀNG (render bằng JS từ brandsData) -->
      <div id="brand-row" class="brand-row"></div>

    </div>

    <!-- VIEWER FRAME: hiển thị subpage của 1 stage. Mặc định nằm bên
         phải (push-right), trượt vào (translateX(0)) khi bấm 1 stage,
         trượt ra lại khi quay về menu chính. -->
    <div id="viewer-frame" class="viewer-frame push-right">
      <img id="viewer-image" class="viewer-image" src="" alt="stage content">
    </div>

  </div>

  <!-- LỚP CHUYỂN TRANG lúc mới load index.html (fade ảnh nền ra), không
       liên quan tới push transition giữa main menu và stage -->
  <div id="transition-overlay" class="transition-overlay active"></div>

  <script src="data.js"></script>
  <script src="transition.js"></script>
  <script src="script.js"></script>
  <script src="pages/page-viewer.js"></script>
</body>
</html>
